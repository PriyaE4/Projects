<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CyberShield Scanning</title>
    <style>
      :root {
        --bg: #0a0e27;
        --card: rgba(26, 31, 58, 0.92);
        --muted: #a0aec0;
        --accent: #00d4ff;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at 20% 20%, #14204a 0%, var(--bg) 55%);
        color: white;
      }
      .wrap {
        max-width: 880px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid rgba(0, 212, 255, 0.18);
        border-radius: 16px;
        box-shadow: 0 18px 50px rgba(0, 212, 255, 0.12);
        padding: 22px;
      }
      .title {
        margin: 0 0 10px 0;
        font-size: 20px;
        font-weight: 900;
        color: var(--accent);
      }
      .sub {
        margin: 0 0 14px 0;
        color: var(--muted);
        line-height: 1.4;
        font-size: 13px;
      }
      .note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        white-space: pre-wrap;
      }
      .url {
        word-break: break-all;
        font-size: 12px;
        color: white;
        opacity: 0.92;
      }
      .spinner {
        margin-top: 16px;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 4px solid rgba(255,255,255,0.12);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">Scanning with CyberShield…</h1>
        <p class="sub">
          Checking the URL before opening the site. Safe sites open automatically.
          If risky, CyberShield Guard will appear.
        </p>
        <div class="url" id="url"></div>
        <div class="note" id="note"></div>
        <div class="spinner" aria-label="Loading"></div>
      </div>
    </div>
    <script src="scanning.js"></script>
  </body>
</html>
